<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramais | Ferreira Costa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://static.vecteezy.com/system/resources/thumbnails/025/225/156/small/3d-illustration-icon-of-phone-call-with-circular-or-round-podium-png.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="menu-icon" onclick="toggleMenu()">☰</button>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-item" onclick="switchView('consulta')">🔍 Consultar</div>
        <div class="sidebar-item" onclick="prepareAdd()">➕ Novo Ramal</div>
        <div class="sidebar-item" style="color: #ff8e8e; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;" onclick="toggleModal(true)">🚨 ACIDENTE</div>
    </div>

    <div class="header-brand">
        <div class="brand-name">
            <img src="https://d2urakutajlof6.cloudfront.net/logo/logo_fc.svg" alt="Ferreira Costa">
            <span>Guia de Ramais</span>
        </div>
    </div>

    <div class="container">
        <div id="view-consulta" class="view-section active">
            <div class="search-container">
                <input type="text" id="search" onkeyup="filtrar()" placeholder="Procure por nome ou setor...">
            </div>
            <table>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>

        <div id="view-cadastro" class="view-section">
            <button class="btn-close-view" onclick="switchView('consulta', true)">&times;</button>
            <h2 id="form-title">Cadastro</h2>
            <input type="hidden" id="edit-id"> <div class="form-group">
                <label>NOME COMPLETO</label>
                <input type="text" id="n-nome" placeholder="Ex: JOÃO SILVA">
            </div>
            <div class="form-group">
                <label>SETOR</label>
                <input type="text" id="n-setor" placeholder="Ex: VENDAS">
            </div>
            <div class="form-group">
                <label>CELULAR (OPCIONAL)</label>
                <input type="text" id="n-contato" maxlength="15" placeholder="(00) 00000-0000" oninput="aplicarMascaraTelefone(this)">
            </div>
            <div class="form-group">
                <label>RAMAL</label>
                <input type="text" id="n-ramal" placeholder="Ex: 8000">
            </div>
            <button class="btn-save" onclick="save()">SINCRONIZAR COM BANCO</button>
        </div>
    </div>

    <div id="modal" class="modal-overlay" onclick="if(event.target.id === 'modal') toggleModal(false)">
        <div class="modal-content">
            <h2>🚨 Protocolo de Acidente</h2>
            <p>Instruções de emergência.</p>
            <div class="emergency-box">
                <div>📞 Seg. do Trabalho: <strong>8578</strong></div>
                <div>📞 CFTV: <strong>8343</strong></div>
                <div>📞 SAMU: <strong>192</strong></div>
            </div>
            <button onclick="toggleModal(false)" class="btn-save btn-secondary">FECHAR</button>
        </div>
    </div>

    <footer>🛡️ Prevenção de Perdas | Ferreira Costa</footer>

    <script src="script.js"></script>
</body>
</html>
